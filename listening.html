<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N5 Listening Practice - Jv Cataquiz</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.2);
  --text: #e8eaf0;
  --muted: rgba(232,234,240,0.45);
  --gold: #f0c060;
  --listening: #ff6b9d;
  --correct: #4ade80;
  --wrong: #ff6b6b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0; pointer-events: none;
}

.topbar {
  position: fixed; top:0; left:0; right:0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 32px;
  background: rgba(8,12,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.topbar-brand {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px; font-weight: 700;
  color: var(--gold); letter-spacing: 0.05em;
  text-decoration: none;
}

.topbar-tag {
  font-size: 12px; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 4px 14px; border-radius: 20px;
}

.container {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 100px 32px 60px;
}

.header {
  text-align: center; margin-bottom: 48px;
}

.header-icon {
  font-size: 64px; display: block; margin-bottom: 12px;
}

.header-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 48px; font-weight: 800;
  background: linear-gradient(135deg, #ff6b9d 0%, #ffa6c1 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 12px;
}

.header-subtitle {
  font-size: 14px; color: var(--muted);
  letter-spacing: 0.15em; text-transform: uppercase;
}

.progress-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  height: 32px; margin-bottom: 32px;
  overflow: hidden; position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff6b9d, #ffa6c1);
  transition: width 0.5s ease;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  color: #fff;
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 24px;
  transition: all 0.3s ease;
}

.question-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 24px;
}

.question-type {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--listening);
  background: rgba(255,107,157,0.1);
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid rgba(255,107,157,0.2);
}

.question-num {
  font-size: 13px; color: var(--muted);
  font-weight: 600;
}

.audio-player {
  display: flex; align-items: center; gap: 16px;
  background: rgba(255,107,157,0.08);
  border: 1px solid rgba(255,107,157,0.2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 32px;
}

.play-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff6b9d, #ffa6c1);
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
  flex-shrink: 0;
}

.play-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 24px rgba(255,107,157,0.3);
}

.play-btn:active {
  transform: scale(0.95);
}

.audio-info {
  flex: 1;
}

.audio-label {
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 4px;
}

.audio-text {
  font-size: 14px; color: var(--text);
  font-weight: 500;
}

.question-text {
  font-size: 18px; font-weight: 500;
  color: var(--text); margin-bottom: 28px;
  line-height: 1.6;
}

.options {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 24px;
}

.option {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 18px 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex; align-items: center; gap: 14px;
  font-size: 15px;
}

.option:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
}

.option.selected {
  border-color: var(--listening);
  background: rgba(255,107,157,0.08);
}

.option.correct {
  border-color: var(--correct);
  background: rgba(74,222,128,0.08);
}

.option.wrong {
  border-color: var(--wrong);
  background: rgba(255,107,107,0.08);
}

.option-letter {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 14px;
  flex-shrink: 0;
}

.option.selected .option-letter {
  background: var(--listening);
  color: #fff;
}

.option.correct .option-letter {
  background: var(--correct);
  color: #fff;
}

.option.wrong .option-letter {
  background: var(--wrong);
  color: #fff;
}

.picture-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.picture-option {
  aspect-ratio: 1;
  background: var(--surface);
  border: 3px solid var(--border);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
  font-size: 48px;
  position: relative;
}

.picture-option:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: scale(1.02);
}

.picture-option.selected {
  border-color: var(--listening);
  background: rgba(255,107,157,0.08);
}

.picture-option.correct {
  border-color: var(--correct);
  background: rgba(74,222,128,0.08);
}

.picture-option.wrong {
  border-color: var(--wrong);
  background: rgba(255,107,107,0.08);
}

.picture-label {
  font-size: 13px;
  color: var(--text);
  margin-top: 12px;
  font-weight: 500;
}

.btn-group {
  display: flex; gap: 12px;
  justify-content: center;
}

.btn {
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: 'DM Sans', sans-serif;
}

.btn-primary {
  background: linear-gradient(135deg, #ff6b9d, #ffa6c1);
  color: #fff;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,107,157,0.3);
}

.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}

.btn-secondary:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.feedback {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.6;
}

.feedback.correct {
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.3);
  color: var(--correct);
}

.feedback.wrong {
  background: rgba(255,107,107,0.08);
  border: 1px solid rgba(255,107,107,0.3);
  color: var(--wrong);
}

.results-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  text-align: center;
}

.results-icon {
  font-size: 80px; margin-bottom: 24px;
}

.results-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 36px; font-weight: 800;
  margin-bottom: 12px;
}

.results-score {
  font-size: 48px; font-weight: 800;
  background: linear-gradient(135deg, #ff6b9d, #ffa6c1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 32px;
}

.results-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 32px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: 32px; font-weight: 700;
  color: var(--text);
  display: block;
  margin-bottom: 8px;
}

.stat-label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

@media (max-width: 768px) {
  .container { padding: 90px 20px 40px; }
  .question-card { padding: 28px 20px; }
  .picture-options { grid-template-columns: repeat(2, 1fr); }
  .results-stats { grid-template-columns: 1fr; gap: 16px; }
  .topbar { padding: 12px 20px; }
  .topbar-tag { display: none; }
}

.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.question-card { animation: fadeIn 0.4s ease; }
</style>
</head>
<body>

<div class="bg-grid"></div>

<header class="topbar">
  <a href="index.html" class="topbar-brand">✨ Jv Cataquiz's Learning Hub</a>
  <span class="topbar-tag">N5 Listening</span>
</header>

<div class="container">

];

let currentQuestion = 0;
let score = 0;
let userAnswers = [];

const synth = window.speechSynthesis;
let japaneseVoice = null;

// Initialize Japanese voice
function initVoice() {
  const voices = synth.getVoices();
  japaneseVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
  if (!japaneseVoice) {
    console.warn('Japanese voice not found, using default');
  }
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = initVoice;
}
initVoice();

function playAudio(text) {
  synth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ja-JP';
  utterance.rate = 0.85;
  if (japaneseVoice) {
    utterance.voice = japaneseVoice;
  }
  synth.speak(utterance);
}

function updateProgress() {
  const progress = ((currentQuestion) / questions.length) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('progressBar').textContent = `${currentQuestion} / ${questions.length}`;
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById('quizContainer');
  
  let typeLabel = '';
  if (q.type === 'conversation') typeLabel = '会話理解';
  else if (q.type === 'picture') typeLabel = '絵を選ぶ';
  else if (q.type === 'marubatsu') typeLabel = '○✕問題';
  
  let optionsHTML = '';
  
  if (q.type === 'conversation') {
    optionsHTML = '<div class="options">';
    q.options.forEach((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      optionsHTML += `
        <div class="option" data-index="${i}">
          <div class="option-letter">${letter}</div>
          <span>${opt}</span>
        </div>
      `;
    });
    optionsHTML += '</div>';
  } else if (q.type === 'picture') {
    optionsHTML = '<div class="picture-options">';
    q.pictures.forEach((pic, i) => {
      optionsHTML += `
        <div class="picture-option" data-index="${i}">
          <div style="font-size:64px;">${pic}</div>
          <div class="picture-label">${q.labels[i]}</div>
        </div>
      `;
    });
    optionsHTML += '</div>';
  } else if (q.type === 'marubatsu') {
    optionsHTML = `
      <div class="options">
        <div class="option" data-value="true">
          <div class="option-letter">○</div>
          <span>正しい (Maru)</span>
        </div>
        <div class="option" data-value="false">
          <div class="option-letter">✕</div>
          <span>間違い (Batsu)</span>
        </div>
      </div>
    `;
  }
  
  container.innerHTML = `
    <div class="question-card">
      <div class="question-header">
        <div class="question-type">${typeLabel}</div>
        <div class="question-num">問題 ${currentQuestion + 1} / ${questions.length}</div>
      </div>
      
      <div class="audio-player">
        <button class="play-btn" onclick="playAudio('${q.audio.replace(/'/g, "\\'")}')">▶</button>
        <div class="audio-info">
          <div class="audio-label">音声を聞いてください</div>
          <div class="audio-text">クリックして再生</div>
        </div>
      </div>
      
      <div class="question-text">${q.question}</div>
      
      ${optionsHTML}
      
      <div class="btn-group">
        <button class="btn btn-primary" id="submitBtn" disabled>答える</button>
      </div>
      
      <div id="feedback"></div>
    </div>
  `;
  
  // Add click handlers
  const options = container.querySelectorAll('.option, .picture-option');
  options.forEach(opt => {
    opt.addEventListener('click', () => {
      options.forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      document.getElementById('submitBtn').disabled = false;
    });
  });
  
  document.getElementById('submitBtn').addEventListener('click', checkAnswer);
  
  // Auto-play audio
  setTimeout(() => playAudio(q.audio), 300);
}

function checkAnswer() {
  const q = questions[currentQuestion];
  const selected = document.querySelector('.option.selected, .picture-option.selected');
  
  if (!selected) return;
  
  let userAnswer;
  let isCorrect;
  
  if (q.type === 'marubatsu') {
    userAnswer = selected.dataset.value === 'true';
    isCorrect = userAnswer === q.correct;
  } else {
    userAnswer = parseInt(selected.dataset.index);
    isCorrect = userAnswer === q.correct;
  }
  
  userAnswers.push({
    question: currentQuestion,
    userAnswer: userAnswer,
    correct: isCorrect
  });
  
  if (isCorrect) {
    score++;
    selected.classList.add('correct');
  } else {
    selected.classList.add('wrong');
    // Show correct answer
    if (q.type === 'marubatsu') {
      document.querySelector(`.option[data-value="${q.correct}"]`).classList.add('correct');
    } else {
      document.querySelectorAll('.option, .picture-option')[q.correct].classList.add('correct');
    }
  }
  
  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  feedback.innerHTML = isCorrect 
    ? '✓ 正解です！ (Correct!)' 
    : `✗ 残念。正解は: ${q.type === 'marubatsu' ? (q.correct ? '○ 正しい' : '✕ 間違い') : (q.type === 'conversation' ? q.options[q.correct] : q.labels[q.correct])}`;
  
  document.getElementById('submitBtn').textContent = currentQuestion < questions.length - 1 ? '次へ' : '結果を見る';
  document.getElementById('submitBtn').onclick = nextQuestion;
}

function nextQuestion() {
  currentQuestion++;
  updateProgress();
  
  if (currentQuestion < questions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  const percentage = Math.round((score / questions.length) * 100);
  const container = document.getElementById('quizContainer');
  
  let emoji = '🎉';
  let message = '素晴らしい！';
  
  if (percentage >= 90) {
    emoji = '🏆';
    message = '完璧です！';
  } else if (percentage >= 70) {
    emoji = '🎉';
    message = '素晴らしい！';
  } else if (percentage >= 50) {
    emoji = '👍';
    message = '良くできました！';
  } else {
    emoji = '💪';
    message = 'もう少し頑張りましょう！';
  }
  
  container.innerHTML = `
    <div class="results-card">
      <div class="results-icon">${emoji}</div>
      <h2 class="results-title">${message}</h2>
      <div class="results-score">${percentage}%</div>
      
      <div class="results-stats">
        <div class="stat">
          <span class="stat-num">${score}</span>
          <span class="stat-label">正解</span>
        </div>
        <div class="stat">
          <span class="stat-num">${questions.length - score}</span>
          <span class="stat-label">不正解</span>
        </div>
        <div class="stat">
          <span class="stat-num">${questions.length}</span>
          <span class="stat-label">合計</span>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="location.reload()">もう一度</button>
        <button class="btn btn-secondary" onclick="location.href='index.html'">ホームへ</button>
      </div>
    </div>
  `;
}

// Initialize
updateProgress();
renderQuestion();
</script>
