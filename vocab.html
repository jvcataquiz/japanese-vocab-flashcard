<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary - JLPT N5</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    background: #2ecc71;
    color: white;
    padding: 15px;
    margin: 0;
}

.container {
    padding: 20px;
    max-width: 700px;
    margin: auto;
}

.back-button {
    display: inline-block;
    margin: 10px 0;
    padding: 8px 16px;
    background: #95a5a6;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    cursor: pointer;
}

.back-button:hover {
    background: #7f8c8d;
}

.card {
    background: white;
    padding: 40px;
    font-size: 28px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin: 20px 0;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.primary { background: #3498db; color: white; }
.success { background: #2ecc71; color: white; }

input {
    padding: 10px;
    width: 80%;
    font-size: 16px;
    margin-top: 10px;
}

.hidden { display: none; }

.result-box {
    text-align: left;
    margin-top: 20px;
}
.correct { color: green; }
.wrong { color: red; }

.mode-buttons {
    margin-top: 20px;
}
</style>
</head>
<body>

<h1>単 Vocabulary Learning</h1>

<div class="container">

<a href="index.html" class="back-button">← Back to Hub</a>

<div class="mode-buttons">
    <button class="primary" onclick="startFlashcard()">Flashcard Mode</button>
    <button class="success" onclick="startExam()">Exam Mode</button>
</div>

<div id="flashcardSection" class="hidden">
    <div class="card" id="flashcard"></div>
    <button onclick="showAnswer()">Show Answer</button>
    <button onclick="nextFlashcard()">Next</button>
</div>

<div id="examSection" class="hidden">
    <div class="card" id="question"></div>
    <input type="text" id="answerInput" placeholder="Type English meaning">
    <br>
    <button onclick="submitAnswer()">Submit</button>
</div>

<div id="resultSection" class="hidden">
    <h2>Exam Result</h2>
    <p id="score"></p>
    <div id="resultDetails" class="result-box"></div>
    <button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

let vocabulary = [];
let currentFlashcardData = [];

fetch('vocab.txt')
  .then(response => response.text())
  .then(data => {
    vocabulary = data.split('\n')
      .filter(line => line.trim())
      .map(line => {
        const [jp, en] = line.split(',');
        return { jp: jp?.trim(), en: en?.trim() };
      });
  });

let currentIndex = 0;

function startFlashcard(){
    currentFlashcardData = [...vocabulary].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    document.getElementById("flashcardSection").classList.remove("hidden");
    document.getElementById("examSection").classList.add("hidden");
    document.getElementById("resultSection").classList.add("hidden");
    document.getElementById("flashcard").innerText = "";
    showFlashcard(currentFlashcardData);
}

function showFlashcard(data){
    document.getElementById("flashcard").innerText = data[currentIndex].jp;
}

function showAnswer(){
    if (currentFlashcardData && currentFlashcardData[currentIndex]) {
        document.getElementById("flashcard").innerText = `${currentFlashcardData[currentIndex].jp} = ${currentFlashcardData[currentIndex].en}`;
    }
}

function nextFlashcard(){
    currentIndex = (currentIndex + 1) % currentFlashcardData.length;
    document.getElementById("flashcard").innerText = currentFlashcardData[currentIndex].jp;
}

let examIndex = 0;
let score = 0;
let results = [];
let examData = [];

function startExam(){
    examData = [...vocabulary]
        .sort(() => Math.random() - 0.5)
        .slice(0, 20);
    examIndex = 0;
    score = 0;
    results = [];
    document.getElementById("examSection").classList.remove("hidden");
    document.getElementById("flashcardSection").classList.add("hidden");
    document.getElementById("resultSection").classList.add("hidden");
    document.getElementById("resultDetails").innerHTML = "";
    document.getElementById("score").innerText = "";
    showQuestion(examData);
}

function showQuestion(data){
    if(examIndex >= data.length){
        showResults(data);
        return;
    }
    document.getElementById("question").innerHTML =
        `<div>Question ${examIndex + 1} of ${data.length}</div>${data[examIndex].jp}`;
    document.getElementById("answerInput").value = "";
}

function submitAnswer(){
    let userAnswer = document.getElementById("answerInput").value.trim().toLowerCase();
    let correctAnswer = examData[examIndex]?.en?.trim().toLowerCase();
    let correct = userAnswer === correctAnswer;
    if(correct) score++;
    results.push({
        jp: examData[examIndex]?.jp,
        correctAnswer: examData[examIndex]?.en,
        userAnswer: userAnswer,
        correct: correct
    });
    examIndex++;
    if (examIndex < examData.length) {
        showQuestion(examData);
    } else {
        showResults();
    }
}

function showResults(){
    document.getElementById("examSection").classList.add("hidden");
    document.getElementById("resultSection").classList.remove("hidden");
    document.getElementById("score").innerText =
        "Score: " + score + " / " + results.length;

    let detailHTML = "";
    results.forEach(item => {
        if(item.correct){
            detailHTML += `<p class="correct">✔ ${item.jp} = ${item.correctAnswer}</p>`;
        } else {
            detailHTML += `<p class="wrong">✘ ${item.jp} → Your answer: "${item.userAnswer}" | Correct: "${item.correctAnswer}"</p>`;
        }
    });
    document.getElementById("resultDetails").innerHTML = detailHTML;
}

</script>

</body>
</html>
