let currentIndex = 0;

function startFlashcard(){
    document.getElementById("flashcardSection").classList.remove("hidden");
    document.getElementById("examSection").classList.add("hidden");
    showFlashcard();
}

function showFlashcard(){
    document.getElementById("flashcard").innerText = vocabulary[currentIndex].jp;
}

function showAnswer(){
    document.getElementById("flashcard").innerText =
        vocabulary[currentIndex].jp + " = " + vocabulary[currentIndex].en;
}

function nextFlashcard(){
    currentIndex = (currentIndex + 1) % vocabulary.length;
    showFlashcard();
}

let examIndex = 0;
let score = 0;
let results = [];

function startExam(){
    examIndex = 0;
    score = 0;
    results = [];
    document.getElementById("examSection").classList.remove("hidden");
    document.getElementById("flashcardSection").classList.add("hidden");
    showQuestion();
}

function showQuestion(){
    if(examIndex >= vocabulary.length){
        showResults();
        return;
    }
    document.getElementById("question").innerText = vocabulary[examIndex].jp;
    document.getElementById("answerInput").value = "";
}

function submitAnswer(){
    let userAnswer = document.getElementById("answerInput").value.trim().toLowerCase();
    let correctAnswer = vocabulary[examIndex].en.toLowerCase();
    let correct = userAnswer === correctAnswer;
    if(correct) score++;
    results.push({
        jp: vocabulary[examIndex].jp,
        correctAnswer: vocabulary[examIndex].en,
        userAnswer: userAnswer,
        correct: correct
    });
    examIndex++;
    showQuestion();
}

function showResults(){
    document.getElementById("examSection").classList.add("hidden");
    document.getElementById("resultSection").classList.remove("hidden");
    document.getElementById("score").innerText =
        "Score: " + score + " / " + vocabulary.length;

    let detailHTML = "";
    results.forEach(item=>{
        if(item.correct){
            detailHTML += `<p class="correct">✔ ${item.jp} = ${item.correctAnswer}</p>`;
        } else {
            detailHTML += `<p class="wrong">✘ ${item.jp} → Your answer: "${item.userAnswer}" | Correct: "${item.correctAnswer}"</p>`;
        }
    });
    document.getElementById("resultDetails").innerHTML = detailHTML;
}

</script>
