<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerick's JLPT N5 Learning Hub</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    text-align: center;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "Jerick's JLPT N5 Learning Hub";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    z-index: 1000;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

body::after {
    content: "© 2026 Jerick's Learning Platform";
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.9);
    color: rgba(255, 255, 255, 0.7);
    padding: 12px;
    font-size: 13px;
    z-index: 1000;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

h1 {
    color: white;
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-top: 20px;
}

.branding {
    color: #ffd700;
    font-size: 18px;
    margin-bottom: 5px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    letter-spacing: 1px;
}

.subtitle {
    color: #ecf0f1;
    font-size: 20px;
    margin-bottom: 50px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    max-width: 900px;
    padding: 20px;
    margin-top: 40px;
    margin-bottom: 50px;
    width: 100%;
}

.category-card {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    text-decoration: none;
    color: #2c3e50;
    display: block;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.category-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
}

.category-card h2 {
    margin: 0 0 10px 0;
    font-size: 36px;
}

.category-card p {
    margin: 0;
    color: #7f8c8d;
    font-size: 16px;
}

.kanji-card { border-top: 5px solid #e74c3c; }
.verbs-card { border-top: 5px solid #3498db; }
.vocab-card { border-top: 5px solid #2ecc71; }

.emoji {
    font-size: 60px;
    margin-bottom: 15px;
}

/* Tablet (iPad, etc.) */
@media (max-width: 1024px) {
    h1 {
        font-size: 42px;
        margin-bottom: 8px;
    }

    .branding {
        font-size: 16px;
    }

    .subtitle {
        font-size: 18px;
        margin-bottom: 40px;
    }

    .container {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 18px;
        max-width: 800px;
    }

    .category-card {
        padding: 30px;
        min-height: 280px;
    }

    .category-card h2 {
        font-size: 32px;
    }

    .emoji {
        font-size: 55px;
        margin-bottom: 12px;
    }
}

/* Mobile (Large phones) */
@media (max-width: 768px) {
    body::before {
        font-size: 14px;
        padding: 10px;
    }

    body::after {
        font-size: 11px;
        padding: 10px;
    }

    h1 {
        font-size: 36px;
        margin-bottom: 8px;
        margin-top: 15px;
    }

    .branding {
        font-size: 15px;
        margin-bottom: 5px;
    }

    .subtitle {
        font-size: 16px;
        margin-bottom: 35px;
    }

    .container {
        grid-template-columns: 1fr;
        gap: 16px;
        max-width: 90%;
        padding: 15px;
        margin-top: 35px;
        margin-bottom: 45px;
    }

    .category-card {
        padding: 28px;
        min-height: 250px;
        border-radius: 12px;
    }

    .category-card h2 {
        font-size: 28px;
        margin: 0 0 8px 0;
    }

    .category-card p {
        font-size: 15px;
    }

    .emoji {
        font-size: 50px;
        margin-bottom: 10px;
    }
}

/* Small Mobile (iPhone SE, Small phones) */
@media (max-width: 480px) {
    body::before {
        font-size: 13px;
        padding: 8px;
    }

    body::after {
        font-size: 10px;
        padding: 8px;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 6px;
        margin-top: 12px;
    }

    .branding {
        font-size: 14px;
    }

    .subtitle {
        font-size: 15px;
        margin-bottom: 30px;
    }

    .container {
        grid-template-columns: 1fr;
        gap: 14px;
        max-width: 95%;
        padding: 12px;
        margin-top: 30px;
        margin-bottom: 40px;
    }

    .category-card {
        padding: 24px;
        min-height: 220px;
        border-radius: 10px;
    }

    .category-card h2 {
        font-size: 24px;
        margin: 0 0 6px 0;
    }

    .category-card p {
        font-size: 14px;
    }

    .emoji {
        font-size: 45px;
        margin-bottom: 8px;
    }
}

/* Extra Small Mobile (Very small phones) */
@media (max-width: 375px) {
    h1 {
        font-size: 28px;
    }

    .branding {
        font-size: 13px;
    }

    .subtitle {
        font-size: 14px;
    }

    .container {
        max-width: 100%;
        padding: 10px;
    }

    .category-card {
        padding: 20px;
        min-height: 200px;
    }

    .category-card h2 {
        font-size: 22px;
    }

    .emoji {
        font-size: 40px;
    }
}

/* Large Desktop (PC, Laptop with large screens) */
@media (min-width: 1440px) {
    h1 {
        font-size: 56px;
    }

    .branding {
        font-size: 22px;
    }

    .subtitle {
        font-size: 24px;
    }

    .container {
        grid-template-columns: repeat(3, 1fr);
        max-width: 1200px;
        gap: 30px;
    }

    .category-card {
        padding: 50px;
        min-height: 350px;
    }

    .category-card h2 {
        font-size: 42px;
    }

    .category-card p {
        font-size: 18px;
    }

    .emoji {
        font-size: 70px;
    }
}
</style>
</head>
<body>

<h1>🗾 JLPT N5 Learning Hub</h1>
<p class="branding">✨ Jerick's Premium Learning Platform ✨</p>
<p class="subtitle">Choose a category to begin</p>

<div class="container">
    <a href="kanji.html" class="category-card kanji-card">
        <div class="emoji">文</div>
        <h2>Kanji</h2>
        <p>Learn kanji characters</p>
    </a>

    <a href="verbs.html" class="category-card verbs-card">
        <div class="emoji">動</div>
        <h2>Verbs</h2>
        <p>Master Japanese verbs</p>
    </a>

    <a href="vocab.html" class="category-card vocab-card">
        <div class="emoji">単</div>
        <h2>Vocabulary</h2>
        <p>Build your vocabulary</p>
    </a>
</div>

</body>
</html>
